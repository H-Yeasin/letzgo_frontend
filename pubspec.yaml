name: letzgo_app
description: "LetzGo - Micro-pooling matchmaker for commuters"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI Components
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fluttertoast: ^8.2.10
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  firebase_auth: ^5.3.4

  # Phone number
  phone_numbers_parser: ^9.0.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  json_annotation: ^4.9.0
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.3
  mockito: ^5.4.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/